# Github Actions 自动化每天随机时间贡献1-2次，
# 将日期、标准时间、北京时间，当日提交次数，
# 追加内容到 README.md 文件中

name: Daily Random Contribution

on:
  schedule:
    # 每天UTC时间16点触发（北京时间0点），然后在1-23小时内随机延迟
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  contribute:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Generate random time and contribute
        run: |
          # 生成随机延迟时间（1-23小时之间）
          RANDOM_DELAY=$((RANDOM % 23 + 1))
          echo "将在 $RANDOM_DELAY 小时后执行提交..."
          sleep $((RANDOM_DELAY * 3600))
          
          # 随机决定提交次数（1或2次）
          COMMIT_COUNT=$((RANDOM % 2 + 1))
          echo "COMMIT_COUNT=$COMMIT_COUNT" >> $GITHUB_ENV
          
          echo "开始执行 $COMMIT_COUNT 次提交..."
          
          for i in $(seq 1 $COMMIT_COUNT); do
            # 每次提交之间间隔随机时间（5-45分钟）
            if [ $i -gt 1 ]; then
              SLEEP_TIME=$((RANDOM % 40 + 5))
              echo "等待 $SLEEP_TIME 分钟后进行第 $i 次提交..."
              sleep $((SLEEP_TIME * 60))
            fi
            
            # 获取当前时间
            CURRENT_DATE=$(date '+%Y-%m-%d')
            UTC_TIME=$(date -u '+%H:%M:%S')
            BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%H:%M:%S')
            TIMESTAMP=$(date '+%Y%m%d_%H%M%S')
            
            # 创建或更新 README.md
            if [ ! -f README.md ]; then
              echo "# 贡献记录" > README.md
              echo "" >> README.md
              echo "## 📊 自动化贡献日志" >> README.md
              echo "" >> README.md
            fi
            
            # 确保文件末尾有换行
            if [ -s README.md ]; then
              echo "" >> README.md
            fi
            
            # 追加贡献记录（使用更美观的格式）
            cat >> README.md << EOF
            ---
            ### 🕐 贡献 #$(date '+%Y%m%d%H%M%S')
            - **📅 日期**: $CURRENT_DATE
            - **🕐 标准时间 (UTC)**: $UTC_TIME
            - **🕐 北京时间**: $BEIJING_TIME
            - **📊 当日总提交数**: $COMMIT_COUNT
            - **🔢 当前提交**: $i / $COMMIT_COUNT
            - **⏰ 时间戳**: $TIMESTAMP
            
            EOF
            
            # 提交更改
            git add README.md
            git commit -m "📝 Daily contribution $i/$COMMIT_COUNT [${TIMESTAMP}]"
            
            # 推送更改
            git push origin main
            
            echo "✅ 第 $i 次提交完成"
          done
          
      - name: Final status
        run: |
          echo "## 🎉 每日贡献完成！"
          echo "- 提交次数: ${{ env.COMMIT_COUNT }}"
          echo "- 执行时间: $(date '+%Y-%m-%d %H:%M:%S')"